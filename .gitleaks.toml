# Gitleaks Configuration
# https://github.com/gitleaks/gitleaks
#
# This config extends the default gitleaks rules with project-specific allowlists.

title = "ESGWebApp Gitleaks Config"

# ─── Allowlist ───────────────────────────────────────────────────────────────
# Patterns that are intentionally non-secret (test fixtures, examples, etc.)
[allowlist]
  description = "Global allowlist for ESGWebApp"

  # Paths to ignore (glob patterns)
  paths = [
    '''node_modules/''',
    '''\.env\.example''',
    '''coverage/''',
    '''dist/''',
    '''logs/''',
    '''\.git/''',
    '''package-lock\.json''',
    '''pnpm-lock\.yaml''',
  ]

  # Regex patterns for values that are NOT actual secrets
  regexes = [
    # Test/example JWT secrets used in test files
    '''integration-test-secret-key''',
    '''data-crud-secret''',
    '''dash-secret''',
    '''admin-auth-secret''',
    '''test-secret-key-for-data-crud''',
    '''test-jwt-secret''',
    # setup-env.sh template patterns (not real credentials)
    '''CHANGE_THIS_TO_A_SECURE_RANDOM_STRING''',
  ]

      summary: Get audit logs (admin only)
      parameters:
        - name: table
          in: query
          schema:
            type: string
          description: Filter by table name
        - name: recordId
          in: query
          schema:
            type: integer
          description: Filter by record ID
        - name: userId
          in: query
          schema:
            type: integer
          description: Filter by user who made the change
      responses:
        '200':
          description: Array of audit log entries (max 100)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Telemetry ──
  /telemetry/error:
    post:
      tags: [Telemetry]
      summary: Report frontend error
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                stack:
                  type: string
                componentStack:
                  type: string
                url:
                  type: string
                userAgent:
                  type: string
                timestamp:
                  type: string
      responses:
        '204':
          description: Error logged

  /telemetry/vitals:
    post:
      tags: [Telemetry]
      summary: Report web-vital performance metric
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  enum: [CLS, FID, FCP, LCP, TTFB, INP]
                value:
                  type: number
                id:
                  type: string
                navigationType:
                  type: string
                rating:
                  type: string
                  enum: [good, needs-improvement, poor]
      responses:
        '204':
          description: Metric logged
